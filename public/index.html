<!DOCTYPE html>
<html lang="hu">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Konyha Terveő MVP</title>
  <link rel="stylesheet" href="/css/style.css" />
</head>
<body>

<!-- Sablon valaszto overlay -->
<div id="template-overlay" class="overlay visible">
  <div class="overlay-card">
    <h1>🍳 Konyha Terveő</h1>
    <p>Válassz egy konyha sablont a kezdéshez:</p>
    <div class="template-grid">
      <div class="tpl-card active" data-tpl="straight" onclick="selectTemplate('straight')">
        <div class="tpl-icon">─</div><div class="tpl-label">Egyenes</div></div>
      <div class="tpl-card" data-tpl="l_shape" onclick="selectTemplate('l_shape')">
        <div class="tpl-icon">└</div><div class="tpl-label">L-alakú</div></div>
      <div class="tpl-card" data-tpl="u_shape" onclick="selectTemplate('u_shape')">
        <div class="tpl-icon">∪</div><div class="tpl-label">U-alakú</div></div>
      <div class="tpl-card" data-tpl="island" onclick="selectTemplate('island')">
        <div class="tpl-icon">⊟</div><div class="tpl-label">Szigetes</div></div>
    </div>
    <button class="btn btn-primary btn-lg" onclick="startWithTemplate()">Kezdés →</button>
  </div>
</div>

<!-- BOM overlay -->
<div id="bom-overlay" class="overlay">
  <div class="overlay-card bom-card">
    <button class="btn-icon close-btn" onclick="document.getElementById('bom-overlay').classList.remove('visible')">&#x2715;</button>
    <div id="bom-panel"></div>
  </div>
</div>

<!-- App layout -->
<div id="app-layout">
  <!-- Bal panel -->
  <aside id="left-panel">
    <div class="panel-section" style="flex:0 0 auto">
      <div class="panel-header">
        <span>📁 Projektek</span>
        <button id="btn-new-project" class="btn btn-primary btn-sm" onclick="document.getElementById('template-overlay').classList.add('visible')">+ Új</button>
      </div>
      <ul id="project-list"></ul>
    </div>
    <div class="panel-section" style="flex:0 0 auto">
      <div class="panel-header"><span>🏠 Szoba méretei</span></div>
      <div style="padding:0.5rem;display:grid;grid-template-columns:1fr 1fr 1fr;gap:0.4rem">
        <div class="prop-group"><label>Szélesség</label><input id="room-w" type="number" step="100" value="4000" /></div>
        <div class="prop-group"><label>Mélység</label><input id="room-d" type="number" step="100" value="2800" /></div>
        <div class="prop-group"><label>Magasság</label><input id="room-h" type="number" step="100" value="2700" /></div>
      </div>
      <div style="padding:0 0.5rem 0.5rem">
        <button class="btn btn-primary btn-block" onclick="updateRoom()">✓ Alkalmaz</button>
      </div>
    </div>
    <div class="panel-section">
      <div class="panel-header"><span>🪑 Szekrények</span></div>
      <div class="add-cabinet-grid">
        <button class="btn-add-cab" onclick="addCabinet('base')"><span>🟧</span> Alsó</button>
        <button class="btn-add-cab" onclick="addCabinet('wall')"><span>⬜</span> Felső</button>
        <button class="btn-add-cab" onclick="addCabinet('tall')"><span>📦</span> Magas</button>
        <button class="btn-add-cab" onclick="addCabinet('drawer_base')"><span>🗄️</span> Fiókos</button>
        <button class="btn-add-cab" onclick="addCabinet('corner_base')"><span>📐</span> Sarok</button>
      </div>
      <ul id="cabinet-list"></ul>
    </div>
  </aside>

  <!-- Kozepso viewport -->
  <main id="viewport-area">
    <div id="viewport-toolbar">
      <span id="project-title" class="proj-title-bar">—</span>
      <div class="toolbar-btns">
        <!-- Nezet valto -->
        <button class="btn btn-sm view-btn active" data-view="3d" onclick="switchView('3d')">3D</button>
        <button class="btn btn-sm view-btn" data-view="2d" onclick="switchView('2d')">2D Alaprajz</button>
        <button class="btn btn-sm" onclick="cameraFitAll()">🎯 Nézet</button>
        <button class="btn btn-sm" onclick="takeSnapshot()">📸 Képernyőkép</button>
        <button class="btn btn-sm" onclick="document.getElementById('bom-overlay').classList.add('visible')">📋 Darabjegyzék</button>
      </div>
    </div>
    <div id="viewport3d"></div>
    <div id="canvas2d-wrap" style="display:none;flex:1;align-items:center;justify-content:center;background:#1a1a2e">
      <canvas id="canvas2d" width="900" height="650" style="border:1px solid #2a2a4a;border-radius:8px"></canvas>
    </div>
  </main>

  <!-- Jobb panel -->
  <aside id="right-panel">
    <div class="panel-header"><span>⚙️ Tulajdonságok</span></div>
    <div id="props-panel">
      <p class="empty-hint">Kattints egy szekrényre a szerkesztéshez.</p>
    </div>
  </aside>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r134/three.min.js"></script>
<script>
THREE.OrbitControls = function(camera, domElement) {
  this.target = new THREE.Vector3();
  var isDown=false,lastX=0,lastY=0,phi=Math.PI/4,theta=0.5,radius=6;
  var self=this;
  function update(){ camera.position.set(self.target.x+radius*Math.sin(phi)*Math.cos(theta),self.target.y+radius*Math.cos(phi),self.target.z+radius*Math.sin(phi)*Math.sin(theta)); camera.lookAt(self.target); }
  update();
  domElement.addEventListener('mousedown',function(e){ if(self._disabled) return; isDown=true; lastX=e.clientX; lastY=e.clientY; });
  window.addEventListener('mouseup',function(){ isDown=false; });
  window.addEventListener('mousemove',function(e){ if(!isDown||self._disabled) return; theta-=(e.clientX-lastX)*0.008; phi=Math.max(0.05,Math.min(Math.PI/2-0.05,phi+(e.clientY-lastY)*0.008)); lastX=e.clientX; lastY=e.clientY; update(); });
  domElement.addEventListener('wheel',function(e){ radius=Math.max(1,Math.min(30,radius+e.deltaY*0.01)); update(); });
  this.update=function(){};
  this._fit=function(tx,ty,tz,r){ self.target.set(tx,ty,tz); radius=r; update(); };
  this._disabled=false;
};
</script>
<script src="/js/models.js"></script>
<script src="/js/scene3d.js"></script>
<script src="/js/calculator.js"></script>
<script src="/js/app.js"></script>
<script>
function startWithTemplate(){
  document.getElementById('template-overlay').classList.remove('visible');
  createProject();
}
</script>
</body>
</html>
